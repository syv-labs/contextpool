name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build/upload (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  BIN_NAME: cxp
  PKG_NAME: cxp
  PUBLIC_RELEASE_REPO: syv-labs/cxp
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            ext: ""
            archive: tar.gz
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            ext: ""
            archive: tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Stamp version from tag into Cargo.toml
        shell: python3 {0}
        run: |
          import re, os
          tag = os.environ['RELEASE_TAG'].lstrip('v')
          path = 'Cargo.toml'
          content = open(path).read()
          # Replace only the first bare `version = "..."` line (the [package] version).
          # Dependency versions use inline `{ version = "..." }` syntax and are unaffected.
          updated = re.sub(r'^version = "[^"]+"', f'version = "{tag}"', content, count=1, flags=re.MULTILINE)
          open(path, 'w').write(updated)
          print(f'Stamped Cargo.toml version: {tag}')

      - name: Install musl tools (linux-musl)
        if: startsWith(matrix.target, 'x86_64-unknown-linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # For aarch64 musl, use cross to keep setup reliable.
      - name: Install cross (linux aarch64-musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cargo)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (tar.gz) [non-Windows]
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          mkdir -p dist
          src="target/${{ matrix.target }}/release/${BIN_NAME}${{ matrix.ext }}"
          if [ ! -f "$src" ]; then
            echo "Expected binary not found: $src" >&2
            ls -la "target/${{ matrix.target }}/release" || true
            exit 1
          fi
          cp "$src" "dist/${BIN_NAME}${{ matrix.ext }}"
          chmod +x "dist/${BIN_NAME}${{ matrix.ext }}" || true
          asset="${PKG_NAME}-v${version}-${{ matrix.target }}"
          tar -C dist -czf "${asset}.tar.gz" "${BIN_NAME}${{ matrix.ext }}"

      - name: Package (zip) [Windows]
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${env:RELEASE_TAG}".TrimStart("v")
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $src = "target/${{ matrix.target }}/release/${env:BIN_NAME}${{ matrix.ext }}"
          if (!(Test-Path $src)) {
            Write-Error "Expected binary not found: $src"
          }
          Copy-Item $src "dist/${env:BIN_NAME}${{ matrix.ext }}" -Force
          $asset = "${env:PKG_NAME}-v$version-${{ matrix.target }}"
          $zipPath = "$asset.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "dist/${env:BIN_NAME}${{ matrix.ext }}" -DestinationPath $zipPath -Force

      - name: Upload release asset to public repo
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CXP_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}" # e.g. v0.1.0
          version="${RELEASE_TAG#v}"
          asset="${PKG_NAME}-v${version}-${{ matrix.target }}"
          file=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            file="${asset}.zip"
          else
            file="${asset}.tar.gz"
          fi

          if [ ! -f "$file" ]; then
            echo "Expected release asset not found: $file" >&2
            ls -la . || true
            exit 1
          fi

          # Create the public release if it doesn't exist yet (first matrix leg wins).
          if ! gh release view "$tag" --repo "${PUBLIC_RELEASE_REPO}" >/dev/null 2>&1; then
            gh release create "$tag" --repo "${PUBLIC_RELEASE_REPO}" -t "$tag" -n "" || true
          fi

          gh release upload "$tag" "$file" --repo "${PUBLIC_RELEASE_REPO}" --clobber

  checksums:
    name: checksums
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download public release assets
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.CXP_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          mkdir -p artifacts
          gh release download "$tag" --repo "${PUBLIC_RELEASE_REPO}" --dir artifacts

      - name: Generate checksums
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cd artifacts
          # Only hash our archives (avoid hashing checksums file itself if re-run)
          ls -1 cxp-*.tar.gz cxp-*.zip 2>/dev/null | xargs -I{} sh -c 'sha256sum "{}"' > checksums.txt
          cat checksums.txt

      - name: Upload checksums to public repo
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.CXP_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          gh release upload "$tag" artifacts/checksums.txt --repo "${PUBLIC_RELEASE_REPO}" --clobber

